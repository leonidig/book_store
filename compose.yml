version: '3.8'

services:
  backend:
    # develop:
    #   watch: 
    #     # rebuild image and recreate service
    #     - path: ./backend
    #       action: rebuild
    build: ./backend
    ports:
      - "8134:8134"

  frontend:
    # develop:
    #   watch: 
    #     # rebuild image and recreate service
    #     - path: ./frontend
    #       action: rebuild
    restart: always
    build: ./frontend
    ports:
      - "5000:5000"

    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8134
